# Runs PIT mutation testing on a weekly schedule and on manual dispatch.
# Uploads the HTML report as an artifact so scores can be tracked over time.
# Mutation testing is slower than unit tests (it re-runs the suite for every
# mutant), so it runs weekly rather than on every PR.
name: Mutation Testing

on:
  schedule:
    - cron: "0 4 * * 1"  # Mondays at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run mutation testing
        run: mvn -B pitest:mutationCoverage

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: mutation-report-${{ github.run_number }}
          path: target/pit-reports/
