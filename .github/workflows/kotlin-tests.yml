# Runs Kotlin/JUnit 5 tests on every push and pull request that touches
# source code or the build descriptor. Uploads test results as artifacts
# so failed runs can be diagnosed without re-running locally.
name: Kotlin Tests

on:
  push:
    paths:
      - "src/**/*.kt"
      - "pom.xml"
  pull_request:
    paths:
      - "src/**/*.kt"
      - "pom.xml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run tests
        run: mvn -B test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: test-results
          path: target/surefire-reports/
