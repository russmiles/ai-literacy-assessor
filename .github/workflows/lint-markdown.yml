# Enforces consistent markdown formatting across the repository.
# Runs on every push and pull request that modifies markdown files.
name: Lint Markdown

on:
  push:
    paths:
      - "**/*.md"
  pull_request:
    paths:
      - "**/*.md"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Lint markdown
        run: npx markdownlint-cli2 "**/*.md"
