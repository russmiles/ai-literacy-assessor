version: 2

registries:
  embabel-snapshots:
    type: maven-repository
    url: https://repo.embabel.com/artifactory/libs-snapshot

updates:
  - package-ecosystem: "maven"
    directory: "/"
    registries:
      - embabel-snapshots
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # Group Embabel upgrades so starter + provider move in lockstep
    groups:
      embabel:
        patterns:
          - "com.embabel.agent:*"
    # Block Spring Boot 4.x until Embabel supports it
    ignore:
      - dependency-name: "org.springframework.boot:spring-boot-starter-parent"
        versions: ["[4.0.0,)"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
