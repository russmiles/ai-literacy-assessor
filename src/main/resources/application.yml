spring:
  application:
    name: alci-assessor
  ai:
    ollama:
      # Provide a default so the Embabel OllamaModels bean can
      # initialise even when no local Ollama server is running.
      # The application uses Anthropic/OpenAI — not Ollama — but
      # Embabel's auto-configuration requires this placeholder to
      # resolve. Set to a real URL if you want local model support.
      base-url: http://localhost:11434
      enabled: false

embabel:
  # The default LLM must be a specific model name from the available
  # models list. Embabel's ConfigurableModelProvider validates this at
  # startup. Use a Claude model since Anthropic is the only required key.
  models:
    default-llm: claude-3-7-sonnet-latest
  platform:
    name: alci-assessor
  agent:
    scan:
      packages:
        - com.ailiteracy.assessor.agent
  llm:
    roles:
      # When OPENAI_API_KEY is provided, override balanced and fast
      # roles via environment variables or the openai profile below.
      # Default: Anthropic for all roles (single API key to get started).
      reasoning: anthropic
      balanced: ${EMBABEL_LLM_ROLE_BALANCED:anthropic}
      fast: ${EMBABEL_LLM_ROLE_FAST:anthropic}

---
# OpenAI profile: activated automatically when OPENAI_API_KEY is set.
# Override with: EMBABEL_LLM_ROLE_BALANCED=openai EMBABEL_LLM_ROLE_FAST=openai-mini
# Or set SPRING_PROFILES_ACTIVE=openai explicitly.
spring:
  config:
    activate:
      on-profile: openai

embabel:
  llm:
    roles:
      reasoning: anthropic
      balanced: openai
      fast: openai-mini

# Assessment output directory
assessor:
  output-dir: ./assessments

server:
  port: 8080
